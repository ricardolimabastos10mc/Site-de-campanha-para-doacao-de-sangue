<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

    <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('criadores') }}">Criadores</a>
        <a href="{{ url_for('admin') }}">Admin</a>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message {{ category }}">
                {{ message }}
                <span class="close-flash" onclick="this.parentElement.style.display='none'">&times;</span>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

<h1>Acesso Restrito</h1>
<p>Por favor, insira a senha de administrador:</p>

<form action="{{ url_for('login') }}" method="post" class="feedback-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn-submit">Entrar</button>
</form>
    </div>

    <script>
        window.onscroll = function() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };
    </script>
</body>
</html>
